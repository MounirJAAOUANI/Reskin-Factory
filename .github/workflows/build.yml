name: Flutter Build AAB

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: 'App name (e.g. HabitFlow)'
        required: true
      package_id:
        description: 'Package ID (e.g. com.appfactory.habitflow)'
        required: true
      dart_code:
        description: 'Contents of lib/main.dart (base64-encoded)'
        required: true
      pubspec_yaml:
        description: 'Contents of pubspec.yaml (base64-encoded)'
        required: true

jobs:
  build:
    name: Build Release AAB
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: stable

      - name: Create Flutter project structure
        run: |
          flutter create --org "${PACKAGE_ID%.*}" --project-name "${APP_NAME,,}" temp_project
          cd temp_project
          mkdir -p lib
        env:
          APP_NAME: ${{ inputs.app_name }}
          PACKAGE_ID: ${{ inputs.package_id }}

      - name: Write source files
        run: |
          cd temp_project
          echo "${{ inputs.dart_code }}" | base64 -d > lib/main.dart
          echo "${{ inputs.pubspec_yaml }}" | base64 -d > pubspec.yaml

      - name: Set package ID in Android manifest
        run: |
          cd temp_project
          # Update applicationId in build.gradle
          sed -i "s/applicationId \".*\"/applicationId \"${{ inputs.package_id }}\"/" android/app/build.gradle
          # Update namespace
          sed -i "s/namespace \".*\"/namespace \"${{ inputs.package_id }}\"/" android/app/build.gradle

      - name: Flutter pub get
        run: |
          cd temp_project
          flutter pub get

      - name: Setup Android keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > /tmp/upload-keystore.jks
          cat > temp_project/android/key.properties <<EOF
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=/tmp/upload-keystore.jks
          EOF

      - name: Configure signing in build.gradle
        run: |
          cat > temp_project/android/app/build.gradle << 'GRADLE'
          def keystoreProperties = new Properties()
          def keystorePropertiesFile = rootProject.file('key.properties')
          if (keystorePropertiesFile.exists()) {
              keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
          }

          android {
              namespace "${{ inputs.package_id }}"
              compileSdkVersion 34

              defaultConfig {
                  applicationId "${{ inputs.package_id }}"
                  minSdkVersion 21
                  targetSdkVersion 34
                  versionCode 1
                  versionName "1.0.0"
              }

              signingConfigs {
                  release {
                      keyAlias keystoreProperties['keyAlias']
                      keyPassword keystoreProperties['keyPassword']
                      storeFile keystoreProperties['storeFile'] ? file(keystoreProperties['storeFile']) : null
                      storePassword keystoreProperties['storePassword']
                  }
              }

              buildTypes {
                  release {
                      signingConfig signingConfigs.release
                      minifyEnabled true
                      proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
                  }
              }
          }
          GRADLE

      - name: Build release AAB
        run: |
          cd temp_project
          flutter build appbundle --release

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-bundle
          path: temp_project/build/app/outputs/bundle/release/app-release.aab
          retention-days: 7

      - name: Build summary
        run: |
          AAB_PATH="temp_project/build/app/outputs/bundle/release/app-release.aab"
          AAB_SIZE=$(du -sh "$AAB_PATH" | cut -f1)
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| App | ${{ inputs.app_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Package | ${{ inputs.package_id }} |" >> $GITHUB_STEP_SUMMARY
          echo "| AAB Size | $AAB_SIZE |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ✅ Success |" >> $GITHUB_STEP_SUMMARY
