name: Flutter Build AAB

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: 'App name (e.g. HabitFlow)'
        required: true
      package_id:
        description: 'Package ID (e.g. com.appfactory.habitflow)'
        required: true

jobs:
  build:
    name: Build Release AAB
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: stable

      - name: Create Flutter project structure
        run: |
          flutter create --org "${PACKAGE_ID%.*}" --project-name "${APP_NAME,,}" temp_project
          mkdir -p temp_project/lib
        env:
          APP_NAME: ${{ inputs.app_name }}
          PACKAGE_ID: ${{ inputs.package_id }}

      - name: Write source files from repo
        run: |
          cp build-input/main.dart temp_project/lib/main.dart
          cp build-input/pubspec.yaml temp_project/pubspec.yaml

      - name: Set package ID in Android manifest
        run: |
          sed -i "s/applicationId \".*\"/applicationId \"${{ inputs.package_id }}\"/" temp_project/android/app/build.gradle
          sed -i "s/namespace \".*\"/namespace \"${{ inputs.package_id }}\"/" temp_project/android/app/build.gradle
          # New Gradle DSL uses = assignment
          sed -i "s/applicationId = \".*\"/applicationId = \"${{ inputs.package_id }}\"/" temp_project/android/app/build.gradle
          sed -i "s/namespace = \".*\"/namespace = \"${{ inputs.package_id }}\"/" temp_project/android/app/build.gradle
          # firebase_remote_config requires minSdk >= 21
          sed -i "s/minSdkVersion [0-9]*/minSdkVersion 21/" temp_project/android/app/build.gradle
          sed -i "s/minSdk = [0-9]*/minSdk = 21/" temp_project/android/app/build.gradle

      - name: Flutter pub get
        run: |
          cd temp_project
          flutter pub get

      - name: Setup Android keystore
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_BASE64 }}
          STORE_PASS: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASS: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          if [ -n "$KEYSTORE_B64" ]; then
            echo "$KEYSTORE_B64" | base64 -d > /tmp/upload-keystore.jks
            SPASS="$STORE_PASS"
            KPASS="$KEY_PASS"
            ALIAS="$KEY_ALIAS"
          else
            keytool -genkey -v -keystore /tmp/upload-keystore.jks \
              -alias upload -keyalg RSA -keysize 2048 -validity 10000 \
              -dname "CN=AppFactory,O=AppFactory,C=US" \
              -storepass debugpass123 -keypass debugpass123 -noprompt
            SPASS="debugpass123"
            KPASS="debugpass123"
            ALIAS="upload"
          fi
          printf 'storePassword=%s\nkeyPassword=%s\nkeyAlias=%s\nstoreFile=/tmp/upload-keystore.jks\n' \
            "$SPASS" "$KPASS" "$ALIAS" > temp_project/android/key.properties

      - name: Configure signing in build.gradle
        run: |
          python3 - << 'PYEOF'
          import re

          # Read key.properties written in the previous step
          props = {}
          try:
              with open('temp_project/android/key.properties') as f:
                  for line in f:
                      line = line.strip()
                      if '=' in line:
                          k, v = line.split('=', 1)
                          props[k.strip()] = v.strip()
          except Exception as e:
              print(f"Warning: could not read key.properties: {e}")

          alias    = props.get('keyAlias',      'upload')
          kpass    = props.get('keyPassword',   'debugpass123')
          spass    = props.get('storePassword', 'debugpass123')
          keystore = props.get('storeFile',     '/tmp/upload-keystore.jks')

          print(f"Signing config: alias={alias}, storeFile={keystore}")

          path = 'temp_project/android/app/build.gradle'
          gradle = open(path).read()

          signing_config_block = (
              "    signingConfigs {\n"
              "        release {\n"
              f"            keyAlias '{alias}'\n"
              f"            keyPassword '{kpass}'\n"
              f"            storeFile file('{keystore}')\n"
              f"            storePassword '{spass}'\n"
              "        }\n"
              "    }\n"
          )

          gradle = gradle.replace('    buildTypes {', signing_config_block + '    buildTypes {', 1)
          gradle = re.sub(r'signingConfig\s*=?\s*signingConfigs\.debug', 'signingConfig signingConfigs.release', gradle)

          open(path, 'w').write(gradle)
          print("build.gradle patched successfully")
          PYEOF

      - name: Debug - print build.gradle
        run: |
          echo "=== build.gradle ===" && cat -n temp_project/android/app/build.gradle
          echo "=== key.properties ===" && cat -n temp_project/android/key.properties || echo "(not found)"
          echo "=== keystore exists ===" && ls -la /tmp/upload-keystore.jks || echo "(not found)"

      - name: Build release AAB
        run: |
          cd temp_project
          flutter build appbundle --release --stacktrace 2>&1 | tail -80

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-bundle
          path: temp_project/build/app/outputs/bundle/release/app-release.aab
          retention-days: 7

      - name: Build summary
        run: |
          AAB_PATH="temp_project/build/app/outputs/bundle/release/app-release.aab"
          AAB_SIZE=$(du -sh "$AAB_PATH" | cut -f1)
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| App | ${{ inputs.app_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Package | ${{ inputs.package_id }} |" >> $GITHUB_STEP_SUMMARY
          echo "| AAB Size | $AAB_SIZE |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ✅ Success |" >> $GITHUB_STEP_SUMMARY
